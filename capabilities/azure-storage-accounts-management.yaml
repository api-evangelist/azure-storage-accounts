naftiko: "1.0.0-alpha1"

info:
  label: "Azure Storage Accounts Management"
  description: "Workflow capability for managing Azure Storage Accounts resources. Used by cloud engineers and DevOps teams."
  tags:
    - Azure
    - Cloud
    - Management
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AZURE_SUBSCRIPTION_ID: AZURE_SUBSCRIPTION_ID
      AZURE_ACCESS_TOKEN: AZURE_ACCESS_TOKEN

capability:
  consumes:
    - import: azure-storage-accounts
      location: ./shared/azure-storage-accounts.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: azure-storage-accounts-management-api
      description: "Unified REST API for Azure Storage Accounts management."
      resources:
        - path: /v1/resources
          name: resources
          description: "Resource management"
          operations:
            - method: GET
              name: list
              description: "List all resources"
              call: "azure-storage-accounts.list-storage-accounts"
              with:
                subscriptionId: "rest.subscriptionId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: azure-storage-accounts-management-mcp
      transport: http
      description: "MCP server for AI-assisted Azure Storage Accounts management."
      tools:
        - name: list-storage-accounts
          description: "List StorageAccount resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-storage-accounts.list-storage-accounts"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-blob-containers
          description: "List BlobContainer resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-storage-accounts.list-blob-containers"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-file-shares
          description: "List FileShare resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-storage-accounts.list-file-shares"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-queues
          description: "List Queue resources"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-storage-accounts.list-queues"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
